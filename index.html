<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azatar's Portfolio Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Creepster&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav>
        <div class="logo">
            Azatar's Portfolio Website
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
            <li>Contact</li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-left">
                <div class="one">Welcome to my World</div>
                <div class="two">I am a <span class="bold">&lt;Developer/&gt;</span></div>
                <div class="button-container">
                    <button class="btn">Contact Me</button>
                    <button class="btn">Services</button>
                </div>
            </div>
            <div class="hero-right">
                <img src="azzy.jpg" alt="Azzy's Photo">
            </div>
        </section>

        <section class="projects">
                
             <div class="project row-reverse">
                <div class="project-image">
                    <img src="https://tse3.mm.bing.net/th/id/OIP.kUSWyi3WZ8bQpuRM57w2VwHaEK?pid=Api&P=0&h=180" alt="web">
                </div>
                <div class="project-info">
                   <div class="text">Web Development</div>
                   <p>I create websites using HTML, CSS, JavaScript, MongoDB and React.</p>
                   <div class="buttons">
                    <button class="btn">Learn More</button>
                   </div>
                </div>
            </div>
           
        </section>
    </main>
</body>

</html>
